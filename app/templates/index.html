<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <script src="{{ url_for('static', filename='csrf.js') }}"></script>
    <title>RAGuardian | Enterprise RAG Service</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" sizes="any">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>
    <div class="container app-shell">
        {% set page_title = "Knowledge Assistant" %}
        {% set nav_mode = "main" %}
        {% include "_page_header.html" %}

        <section class="chat-section">
            <div class="chat-toolbar" aria-label="Chat settings">
                <label class="chat-control" for="modelSelect">
                    <span>Model</span>
                    <select id="modelSelect">
                        <option value="">Loading models...</option>
                    </select>
                </label>
                <label class="chat-control" for="promptSelect">
                    <span>System prompt</span>
                    <select id="promptSelect">
                        <option value="">No system prompt</option>
                    </select>
                </label>
                <button type="button" id="clearChatButton" class="secondary">New chat</button>
            </div>

            <div id="chatbox" class="chatbox" aria-live="polite">
                <div id="emptyState" class="empty-state">
                    <div>
                        <span class="empty-state-mark" aria-hidden="true">R</span>
                        <strong>Ask your knowledge base</strong>
                        <p>Search indexed documents, compare sources, or request a concise summary.</p>
                        <div class="prompt-suggestions" aria-label="Suggested questions for the demo">
                            <button type="button" data-prompt="Summarize the main messages from the indexed documents.">Summarize documents</button>
                            <button type="button" data-prompt="What decisions and next steps emerge from the knowledge base?">Find decisions</button>
                            <button type="button" data-prompt="Prepare a concise executive brief from the available sources.">Executive brief</button>
                        </div>
                    </div>
                </div>
            </div>
            <div id="streamStatus" class="stream-status" hidden>Generating response...</div>
            <div class="input-extras">
                <label class="toggle-label">
                    <input type="checkbox" id="codeInterpreterToggle">
                    <span>Code Interpreter</span>
                </label>
            </div>
            <div id="attachedFiles" class="attached-files"></div>
            <div class="input-area">
                <textarea id="userInput" rows="2" aria-label="Message" placeholder="Ask a question about the documents..." autocomplete="off"></textarea>
                <button type="button" id="uploadFileButton" class="icon-btn" title="Attach data file" aria-label="Attach data file"><span aria-hidden="true">+</span></button>
                <button type="button" id="uploadOcrButton" class="icon-btn" title="Extract text from image or PDF" aria-label="Extract text from image or PDF" hidden><span aria-hidden="true">OCR</span></button>
                <button type="button" id="uploadAudioButton" class="icon-btn" title="Record audio for transcription" aria-label="Record audio for transcription"><span aria-hidden="true">●</span></button>
                <button id="sendButton">Send</button>
            </div>

            <input type="file" id="ocrFileInput" class="audio-file-input" accept="image/*,.png,.jpg,.jpeg,.webp,.gif,.bmp,.tif,.tiff,.pdf">
            <input type="file" id="dataFileInput" class="audio-file-input" accept=".csv,.xlsx,.xls,.json,.parquet,.tsv,.zip,.png,.jpg,.jpeg,.gif,.pdf,.txt,.md" multiple>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.2.3/purify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
