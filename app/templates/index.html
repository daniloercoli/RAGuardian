<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAGuardian | Enterprise RAG Service</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" sizes="any">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>
    <div class="container app-shell">
        <header class="page-header">
            <h1>RAGuardian | Enterprise RAG Service</h1>
            {% set nav_mode = "main" %}
            {% include "_top_nav.html" %}
        </header>

        <section class="chat-section">
            <div class="model-selector">
                <label for="modelSelect">Model</label>
                <select id="modelSelect">
                    <option value="">Loading models...</option>
                </select>
                <button type="button" id="clearChatButton" class="secondary">New Chat</button>
            </div>

            <div class="model-selector">
                <label for="promptSelect">System Prompt</label>
                <select id="promptSelect">
                    <option value="">No system prompt</option>
                </select>
            </div>

            <div id="chatbox" class="chatbox" aria-live="polite">
                <div id="emptyState" class="empty-state">
                    <div>
                        <strong>Ready to query the enterprise knowledge base.</strong>
<!-- Demo questions (commented out - kept for future reference)
                        <p>Choose a demo question or write your own.</p>
                        <div class="prompt-suggestions" aria-label="Suggested questions for the demo">
                            <button type="button" data-prompt="Summarize the main messages from the uploaded documents.">Main Messages</button>
                            <button type="button" data-prompt="What decisions or next steps emerge from the knowledge base?">Decisions and Next Steps</button>
                            <button type="button" data-prompt="Prepare an executive summary for a manager.">Executive Summary</button>
                        </div>
                        -->
                    </div>
                </div>
            </div>
            <div id="streamStatus" class="stream-status" hidden>Generating response...</div>
            <div class="input-extras">
                <label class="toggle-label">
                    <input type="checkbox" id="codeInterpreterToggle">
                    <span>Code Interpreter</span>
                </label>
            </div>
            <div id="attachedFiles" class="attached-files"></div>
            <div class="input-area">
                <textarea id="userInput" rows="2" placeholder="Ask a question about the documents..." autocomplete="off"></textarea>
                <button type="button" id="uploadFileButton" class="icon-btn" title="Attach data file">&#128203;</button>
                <button type="button" id="uploadOcrButton" class="icon-btn" title="Extract text from image or PDF" hidden>&#9633;</button>
                <button type="button" id="uploadAudioButton" class="icon-btn" title="Record audio for transcription">&#9672;</button>
                <button id="sendButton">Send</button>
            </div>

            <input type="file" id="ocrFileInput" class="audio-file-input" accept="image/*,.png,.jpg,.jpeg,.webp,.gif,.bmp,.tif,.tiff,.pdf">
            <input type="file" id="dataFileInput" class="audio-file-input" accept=".csv,.xlsx,.xls,.json,.parquet,.tsv,.zip,.png,.jpg,.jpeg,.gif,.pdf,.txt,.md" multiple>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.2.3/purify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
