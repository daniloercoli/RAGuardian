<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <script src="{{ url_for('static', filename='csrf.js') }}"></script>
    <title>Admin Login - RAG Service</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" sizes="any">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container narrow">
        {% set page_title = "Welcome back" %}
        {% set nav_mode = "login" %}
        {% include "_page_header.html" %}

        <section class="panel">
            <h2>Sign in to your workspace</h2>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, message in messages %}
                    <div class="notice {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endwith %}
            <form method="post" class="form-grid">
                <label>
                    Email
                    <input type="email" name="email" placeholder="admin@example.local" autocomplete="username" autofocus>
                </label>
                <label>
                    Password
                    <input type="password" name="password" autocomplete="current-password" required>
                </label>
                <button type="submit">Sign In</button>
            </form>
        </section>
    </div>
</body>
</html>
