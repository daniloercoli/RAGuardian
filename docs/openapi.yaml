openapi: 3.1.0
info:
  title: RAG Service API
  version: "1.0.0"
  summary: Public API for querying and managing the RAG service.
  description: |
    Versioned public API for external applications integrating with the RAG
    service. All `/api/v1/*` endpoints require an `X-API-Key` header. In
    multi-user deployments, each API key resolves to exactly one user
    workspace; queries, uploads, jobs, conversations, and deletes stay inside
    that workspace boundary.
servers:
  - url: http://127.0.0.1:5000
    description: Local development server
tags:
  - name: Health
    description: Service readiness and runtime status.
  - name: Models
    description: Available providers and model selections.
  - name: Query
    description: RAG question answering.
  - name: Files
    description: RAG file upload and indexing.
  - name: OCR
    description: Text extraction from images and PDFs.
  - name: Speech
    description: Audio transcription and text-to-speech.
security:
  - ApiKeyAuth: []
paths:
  /api/v1/health:
    get:
      tags:
        - Health
      operationId: getApiV1Health
      summary: Get service health
      description: |
        Returns runtime health for model configuration, settings, embeddings,
        cache and ChromaDB.
      responses:
        "200":
          description: Service health payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                healthy:
                  value:
                    status: healthy
                    model_configuration_ready: true
                    settings_ready: true
                    embeddings_ready: true
                    cache_enabled: true
                    database_ready: true
                    tracked_files_count: 3
                    indexed_files_count: 3
                    stale_index_files_count: 0
                    needs_rebuild: false
                    system_ready: true
                    stt_ready: true
                    tts_ready: true
                    voice_provider: openai-compatible
                    ocr_ready: false
                    ocr_provider: ""
                    state_backend: memory
                    queue_backend: inline
                    redis_ready: true
                    queue_ready: true
                    queue_depth: 0
                    active_jobs_count: 0
                    collection: documents_user_123
                    documents_count: 128
        "401":
          $ref: "#/components/responses/Unauthorized"
  /metrics:
    get:
      tags:
        - Health
      operationId: getMetrics
      summary: Prometheus metrics
      description: |
        Returns service metrics in Prometheus text exposition format.
        No authentication required. Useful for monitoring dashboards
        (Grafana, Prometheus scraper, etc.).

        Metrics include:
        - Query count and latency histogram
        - Retrieval latency histogram
        - Cache hit/miss counters
        - HTTP request count and latency
        - Active queries gauge
        - Memory usage
        - Uptime
      responses:
        "200":
          description: Prometheus text exposition format metrics.
          content:
            text/plain:
              schema:
                type: string
              examples:
                sample:
                  value: |
                    # HELP rag_queries_total Total RAG queries.
                    # TYPE rag_queries_total counter
                    rag_queries_total{status="success"} 142.0
                    rag_queries_total{status="error"} 5.0
                    # HELP rag_query_duration_seconds RAG query duration.
                    # TYPE rag_query_duration_seconds histogram
                    ...
  /api/v1/models:
    get:
      tags:
        - Models
      operationId: listApiV1Models
      summary: List available models
      description: |
        Returns enabled built-in and custom OpenAI-compatible models that can
        be used in `/api/v1/query`.
      responses:
        "200":
          description: Available models grouped as a flat list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelsResponse"
              examples:
                default:
                  value:
                    default_provider: mistral
                    default_model: mistral-medium
                    default_value: mistral:mistral-medium
                    models:
                      - id: mistral-medium
                        name: mistral-medium (Mistral AI)
                        provider: mistral
                        provider_name: Mistral AI
                        value: mistral:mistral-medium
                        is_default: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          description: Model provider configuration is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                modelConfigurationError:
                  value:
                    error: "No models configured in app/default_providers.json."
                    status: model_configuration_error
                    provider_config_file: app/default_providers.json
                    configure_url: /admin/config
  /api/v1/query:
    post:
      tags:
        - Query
      operationId: postApiV1Query
      summary: Query the RAG service
      description: |
        Answers a question using indexed RAG documents. By default the response
        is JSON. When `stream` is `true`, the response body is progressive
        `text/plain` output. Set `stream_format` to `ndjson` to receive one
        structured JSON event per line, including final context sources.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryRequest"
              examples:
                nonStreaming:
                  value:
                    query: What are the main points of the document?
                    provider: mistral
                    model: mistral-medium
                    conversation_id: chat-20260616-demo
                    response_language: auto
                    temperature: 0.3
                    k: 5
                streaming:
                  value:
                    query: Summarize the document.
                    stream: true
                structuredStreaming:
                  value:
                    query: Summarize the document.
                    stream: true
                    stream_format: ndjson
      responses:
        "200":
          description: Query answer. JSON when `stream` is false, text or NDJSON events when `stream` is true.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryResponse"
              examples:
                answer:
                  value:
                    answer: Response generated by the model.
                    model: mistral-medium
                    provider: mistral
                    provider_name: Mistral AI
                    conversation_id: chat-20260616-demo
                    response_language: auto
                    context:
                      - text: Chunk retrieved from document...
                        metadata:
                          source: app/uploads/workspaces/user_123/demo.pdf
                          chunk_id: 0
                          chunk_length: 924
                    sources:
                      - filename: demo.pdf
                        source_type: pdf
                        chunk_id: 0
                        snippet: Chunk retrieved from document...
                    usage: null
            text/plain:
              schema:
                type: string
              examples:
                streamedText:
                  value: Response generated progressively...
            application/x-ndjson:
              schema:
                type: string
                description: Newline-delimited QueryStreamEvent JSON objects.
              examples:
                streamedEvents:
                  value: |
                     {"type":"meta","model":"mistral-medium","provider":"mistral","provider_name":"Mistral AI","response_language":"auto","conversation_id":"chat-20260616-demo"}
                     {"type":"token","text":"Progressive "}
                     {"type":"token","text":"response..."}
                     {"type":"done","answer":"Progressive response...","model":"mistral-medium","provider":"mistral","provider_name":"Mistral AI","response_language":"auto","conversation_id":"chat-20260616-demo","context":[],"sources":[],"usage":null}
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"
  /api/v1/conversations/{conversation_id}:
    delete:
      tags:
        - Query
      operationId: deleteApiV1Conversation
      summary: Clear conversation memory
      description: Removes the in-process conversational memory associated with the supplied `conversation_id`.
      parameters:
        - name: conversation_id
          in: path
          required: true
          schema:
            type: string
            minLength: 8
            maxLength: 80
            pattern: "^[A-Za-z0-9][A-Za-z0-9_-]*$"
          example: chat-20260616-demo
      responses:
        "200":
          description: Conversation memory reset result.
          content:
            application/json:
              schema:
                type: object
                required:
                  - conversation_id
                  - cleared
                properties:
                  conversation_id:
                    type: string
                  cleared:
                    type: boolean
              examples:
                cleared:
                  value:
                    conversation_id: chat-20260616-demo
                    cleared: true
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"
  /api/v1/files:
    post:
      tags:
        - Files
      operationId: postApiV1Files
      summary: Upload and index a document
      description: |
        Uploads a PDF, TXT, or Markdown document and indexes it into the RAG
        knowledge base of the user workspace resolved by the API key. The
        request requires an API key with `ingest` scope. Public integrations
        should use workspace API keys via `X-API-Key`. Synchronous processing remains the default for
        backward compatibility; pass `async=true` to receive a job id and poll
        `/api/v1/jobs/{job_id}`.
      parameters:
        - name: async
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: When true, save the upload and process indexing as a background job.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: PDF, TXT, or Markdown file to index.
      responses:
        "200":
          description: File uploaded and indexed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileUploadResponse"
              examples:
                uploaded:
                  value:
                    message: documento.pdf uploaded and indexed
                    filename: documento.pdf
                    source_type: pdf
                    chunks: 18
        "202":
          description: File upload accepted for async processing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AsyncJobResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UploadUnauthorized"
        "500":
          $ref: "#/components/responses/ServerError"
  /api/v1/audio:
    post:
      tags:
        - Speech
        - Files
      operationId: postApiV1Audio
      summary: Upload, transcribe, and index audio
      description: Uploads an audio file, transcribes it with the configured STT provider, and indexes the transcript. Optional multipart language overrides the configured STT language for this request. Synchronous processing remains the default for backward compatibility; pass async=true to receive a job id and poll /api/v1/jobs/{job_id}.
      parameters:
        - name: async
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: When true, save the upload and process transcription/indexing as a background job.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Audio file to transcribe and index.
                language:
                  type: string
                  description: Optional STT language hint, such as it or en. Empty or omitted enables fallback to configured language/autodetect.
      responses:
        "200":
          description: Audio transcribed and indexed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AudioUploadResponse"
        "202":
          description: Audio upload accepted for async transcription and indexing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AsyncJobResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UploadUnauthorized"
        "500":
          $ref: "#/components/responses/ServerError"
  /api/v1/jobs/{job_id}:
    get:
      tags:
        - Jobs
      operationId: getApiV1Job
      summary: Get async job status
      description: Returns the current state, errors, and final result for async ingest and rebuild jobs.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
          description: Job id returned by an async endpoint.
      responses:
        "200":
          description: Job status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobStatus"
        "401":
          $ref: "#/components/responses/UploadUnauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/ocr:
    post:
      tags:
        - OCR
      operationId: postApiV1Ocr
      summary: Extract text from an image or PDF
      description: |
        Extracts text from an uploaded image or PDF. For PDFs, the service first
        tries the standard text parser and only uses the configured OCR provider
        when the parser returns no text. This endpoint does not index content in
        the RAG knowledge base.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image or PDF file to extract text from.
      responses:
        "200":
          description: Extracted text.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OcrExtractResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"
  /api/v1/tts:
    post:
      tags:
        - Speech
      operationId: postApiV1Tts
      summary: Synthesize text to speech
      description: Converts text to audio using the configured TTS provider.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TtsRequest"
      responses:
        "200":
          description: Binary audio.
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"
  /api/v1/files/{filename}:
    delete:
      tags:
        - Files
      operationId: deleteApiV1File
      summary: Delete an indexed file
      description: |
        Removes a file from the RAG knowledge base. This deletes ChromaDB chunks
        associated with the file source, removes the administrative file index
        entry, deletes the uploaded file when it is still present under the
        upload folder, and clears the retrieval cache.
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
          example: documento.pdf
      responses:
        "200":
          description: File removed from the knowledge base.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileDeleteResponse"
              examples:
                deleted:
                  value:
                    message: documento.pdf removed from knowledge base
                    filename: documento.pdf
                    source: app/uploads/workspaces/user_123/documento.pdf
                    chunks_deleted: 18
                    file_deleted: true
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UploadUnauthorized"
        "404":
          description: File is not registered in the administrative file index.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                 notFound:
                   value:
                     error: Indexed file not found
                     status: not_found
                     field: filename
        "500":
          $ref: "#/components/responses/ServerError"
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: User/workspace API key configured from `/admin/api-keys`. `RAG_API_KEY` remains available as a legacy global compatibility key.
  responses:
    Unauthorized:
      description: Missing or invalid API key.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            missing:
              value:
                error: Missing or invalid API key
                status: unauthorized
    UploadUnauthorized:
      description: Missing credentials or API key without ingest scope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            missing:
              value:
                error: Upload credentials missing or invalid
                status: unauthorized
    Forbidden:
      description: API key is valid but lacks the required scope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            missingScope:
              value:
                error: "API key missing required scope: speech"
                status: forbidden
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            missing:
              value:
                error: Job non trovato
                status: not_found
    ValidationError:
      description: Request payload failed validation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            invalidQuery:
              value:
                error: query must have at least 3 characters
                status: validation_error
                field: query
    RateLimited:
      description: Too many requests in the configured time window.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            limited:
              value:
                error: Rate limit exceeded
                retry_after: 42
                status: rate_limited
    ServerError:
      description: Internal error or upstream provider error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            serverError:
              value:
                error: Upstream provider unavailable
                status: server_error
  schemas:
    ErrorResponse:
      type: object
      required:
        - error
        - status
      properties:
        error:
          type: string
        status:
          type: string
          examples:
            - validation_error
            - unauthorized
            - rate_limited
            - server_error
            - model_configuration_error
        field:
          type: string
          description: Field that failed validation, when available.
        retry_after:
          type: integer
          minimum: 1
          description: Seconds to wait before retrying after rate limiting.
        provider_config_file:
          type: string
          description: Provider model configuration file path.
        configure_url:
          type: string
          description: Admin page used to fix runtime or model configuration.
      additionalProperties: true
    JobStatus:
      type: object
      required:
        - id
        - status
        - message
        - processed
        - total
        - errors
      properties:
        id:
          type: string
        type:
          type: string
          examples:
            - file_upload
            - audio_upload
            - rebuild_index
        status:
          type: string
          examples:
            - queued
            - running
            - completed
            - failed
        message:
          type: string
        processed:
          type: integer
          minimum: 0
        total:
          type: integer
          minimum: 0
        current_file:
          type: string
        filename:
          type: string
        errors:
          type: array
          items:
            type: object
            properties:
              filename:
                type: string
              error:
                type: string
        result:
          nullable: true
          type: object
          additionalProperties: true
        started_at:
          type: number
        finished_at:
          nullable: true
          type: number
    AsyncJobResponse:
      allOf:
        - $ref: "#/components/schemas/JobStatus"
        - type: object
          required:
            - job_id
          properties:
            job_id:
              type: string
    HealthResponse:
      type: object
      required:
        - status
        - model_configuration_ready
        - settings_ready
        - embeddings_ready
        - cache_enabled
        - database_ready
      properties:
        status:
          type: string
          enum:
            - healthy
            - degraded
            - unhealthy
        model_configuration_ready:
          type: boolean
        settings_ready:
          type: boolean
        embeddings_ready:
          type: boolean
        cache_enabled:
          type: boolean
        database_ready:
          type: boolean
        tracked_files_count:
          type: integer
          minimum: 0
        indexed_files_count:
          type: integer
          minimum: 0
        stale_index_files_count:
          type: integer
          minimum: 0
        needs_rebuild:
          type: boolean
        system_ready:
          type: boolean
          description: True when the system has model config, settings, database, a non-stale index and at least one indexed chunk.
        stt_ready:
          type: boolean
        tts_ready:
          type: boolean
        voice_provider:
          type: string
        ocr_ready:
          type: boolean
        ocr_provider:
          type: string
        state_backend:
          type: string
          enum:
            - memory
            - redis
          description: Runtime state backend for rate limit, cache, conversation memory, and job state.
        queue_backend:
          type: string
          enum:
            - inline
            - redis
          description: Long-running job execution backend.
        redis_ready:
          type: boolean
          description: True when Redis-backed runtime dependencies are available, or Redis is not required.
        queue_ready:
          type: boolean
          description: True when the configured queue backend is ready.
        queue_depth:
          type: integer
          minimum: 0
        active_jobs_count:
          type: integer
          minimum: 0
        redis_error:
          type: string
        queue_error:
          type: string
        index_profile:
          type: object
          additionalProperties: true
        collection:
          type: string
          examples:
            - documents
        documents_count:
          type: integer
          minimum: 0
        model_configuration_error:
          type: string
        provider_config_file:
          type: string
        settings_error:
          type: string
        embeddings_error:
          type: string
        database_error:
          type: string
      additionalProperties: true
    ModelsResponse:
      type: object
      required:
        - models
      properties:
        default_provider:
          type: string
          description: Provider selected by runtime configuration when a query omits provider.
          examples:
            - mistral
        default_model:
          type: string
          description: Model selected by runtime configuration when a query omits model.
          examples:
            - mistral-medium
        default_value:
          type: string
          description: Compact `provider:model` value for the runtime default.
          examples:
            - mistral:mistral-medium
        models:
          type: array
          items:
            $ref: "#/components/schemas/ModelInfo"
    ModelInfo:
      type: object
      required:
        - id
        - name
        - provider
        - provider_name
        - value
      properties:
        id:
          type: string
          examples:
            - mistral-medium
        name:
          type: string
          examples:
            - mistral-medium (Mistral AI)
        provider:
          type: string
          examples:
            - mistral
        provider_name:
          type: string
          examples:
            - Mistral AI
        value:
          type: string
          description: Compact UI value in `provider:model` format.
          examples:
            - mistral:mistral-medium
        is_default:
          type: boolean
          description: True when this model is the configured runtime default.
          examples:
            - true
    QueryRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          minLength: 3
          maxLength: 2000
          description: Natural-language question.
        provider:
          type: string
          description: Provider id returned by `/api/v1/models`.
        model:
          type: string
          description: Model id returned by `/api/v1/models`.
        conversation_id:
          type: string
          minLength: 8
          maxLength: 80
          pattern: "^[A-Za-z0-9][A-Za-z0-9_-]*$"
          description: Optional conversation memory id. Reuse it across requests to enable follow-up context.
        client_context:
          $ref: "#/components/schemas/ClientContext"
        response_language:
          type: string
          default: auto
          description: Output language policy for the RAG answer prompt. Omit or use `auto` to answer in the question language; use `it` or `en` to force Italian or English.
          examples:
            - auto
            - it
            - en
        stream:
          type: boolean
          default: false
          description: Return streaming output when true.
        stream_format:
          type: string
          enum:
            - text
            - ndjson
          default: text
          description: Streaming response format. `ndjson` emits one structured JSON event per line.
        temperature:
          type: number
          minimum: 0
          maximum: 1
        k:
          type: integer
          minimum: 1
          maximum: 50
          description: Number of retrieved chunks.
      additionalProperties: false
    ClientContext:
      type: object
      description: Optional external-client site/page metadata added to the prompt only. It is not indexed and is not returned in sources.
      properties:
        site_name:
          type: string
          maxLength: 120
        page_title:
          type: string
          maxLength: 180
        page_url:
          type: string
          maxLength: 500
          format: uri
        post_type:
          type: string
          maxLength: 80
        locale:
          type: string
          maxLength: 40
        instructions:
          type: string
          maxLength: 1200
      additionalProperties: false
    QueryResponse:
      type: object
      required:
        - answer
        - model
        - provider
        - context
        - usage
      properties:
        answer:
          type: string
        model:
          type: string
        provider:
          type: string
        provider_name:
          type: string
        response_language:
          type: string
          description: Effective output language policy used in the RAG prompt.
          examples:
            - auto
        conversation_id:
          type: string
          description: Present only when the request supplied a conversation_id.
        context:
          type: array
          items:
            $ref: "#/components/schemas/ContextItem"
        sources:
          type: array
          items:
            $ref: "#/components/schemas/PublicSource"
        usage:
          oneOf:
            - type: object
              additionalProperties: true
            - type: "null"
    ContextItem:
      type: object
      required:
        - text
        - metadata
      properties:
        text:
          type: string
        metadata:
          type: object
          additionalProperties: true
    PublicSource:
      type: object
      required:
        - filename
        - source_type
        - snippet
      properties:
        filename:
          type: string
        source_type:
          type: string
          examples:
            - pdf
            - text
            - markdown
            - audio
        chunk_id:
          oneOf:
            - type: string
            - type: integer
        page:
          oneOf:
            - type: string
            - type: integer
        score:
          type: number
        snippet:
          type: string
    FileUploadResponse:
      type: object
      required:
        - message
        - filename
        - chunks
        - source_type
      properties:
        message:
          type: string
        filename:
          type: string
        chunks:
          type: integer
          minimum: 0
        source_type:
          type: string
          enum:
            - pdf
            - text
            - markdown
        ocr_used:
          type: boolean
          description: True when a scanned/empty PDF was indexed through OCR fallback.
    AudioUploadResponse:
      type: object
      required:
        - message
        - filename
        - chunks
        - source_type
        - transcript
      properties:
        message:
          type: string
        filename:
          type: string
        chunks:
          type: integer
          minimum: 0
        source_type:
          type: string
          const: audio
        transcript:
          type: string
        language_hint:
          type: string
          description: STT language hint used for the request, or empty when autodetect was used.
    OcrExtractResponse:
      type: object
      required:
        - filename
        - text
        - method
        - ocr_used
      properties:
        filename:
          type: string
        text:
          type: string
        method:
          type: string
          enum:
            - parsed
            - ocr
        ocr_used:
          type: boolean
    TtsRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 4000
        voice:
          type: string
        format:
          type: string
          enum:
            - mp3
            - wav
            - opus
            - aac
            - flac
    FileDeleteResponse:
      type: object
      required:
        - message
        - filename
        - source
        - chunks_deleted
        - file_deleted
      properties:
        message:
          type: string
        filename:
          type: string
        source:
          type: string
        chunks_deleted:
          type: integer
          minimum: 0
        file_deleted:
          type: boolean
